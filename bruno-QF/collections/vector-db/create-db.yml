info:
  name: create-db
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8000/api/v1/vector-db/build
  body:
    type: json
    data: |-
      {
        "embedding_model": "bge-m3:latest",
        "parent_size": 2500,
        "parent_overlap": 300,
        "child_size": 600,
        "child_overlap": 100
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
